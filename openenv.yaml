spec_version: 1
name: support_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - name: simple_inquiry
    difficulty: easy
    description: "Order status check — look up the order, find tracking info, and respond with status"
    max_steps: 10
  - name: complaint_resolution
    difficulty: medium
    description: "Wrong item complaint with refund — investigate order and history, issue refund, compose empathetic response"
    max_steps: 15
  - name: complex_escalation
    difficulty: hard
    description: "Multi-issue resolution — investigate 3 problems (damaged item, duplicate charge, password reset), take appropriate actions, and compose comprehensive response"
    max_steps: 25
